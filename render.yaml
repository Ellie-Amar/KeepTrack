services:
  - type: web
    name: keeptrack-frontend-ellie-amar
    runtime: static
    plan: free
    branch: main
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://keeptrack-backend-ellie-amar.onrender.com/*
      - type: rewrite
        source: /*
        destination: /index.html
